apiVersion: v1
kind: Service
metadata:
  name: myapp
  namespace: aws-lbc
  # we need t ouse oad balancer typ annotation here otherwise legacy cloud controller manager will be used
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: external
    # using IP mode instead of instance mode for avoiding routing via nodeports and hitting ENI limits
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
    # service.beta.kubernetes.io/aws-load-balancer-proxy-protocol: "*"
spec:
  type: LoadBalancer
  ports:
    - port: 8080
      targetPort: http
  selector:
    app: myapp